<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="./images/phenix_common/phenix_logo.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phenix Systems | أنظمة فينيكس</title>
    <script>
      (function () {
        const savedMode = localStorage.getItem("mode") || "dark";
        const savedLang = localStorage.getItem("lang") || "en";
        const root = document.documentElement;

        if (savedMode === "dark") {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }

        root.setAttribute("dir", savedLang === "ar" ? "rtl" : "ltr");
        root.setAttribute("lang", savedLang);
      })();
    </script>

    <style>
      /*
        ألوان ثابتة قبل أي CSS من Vite — تمنى الشاشة السوداء/الوميض
        وتطابق لون وضع الموقع (فاتح / داكن)
      */
      html {
        min-height: 100dvh;
      }

      html.dark {
        background-color: #18181b !important;
        color-scheme: dark;
      }

      html:not(.dark) {
        background-color: #f8fafc !important;
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background-color: #f8fafc !important;
      }

      html.dark body {
        background-color: #18181b !important;
      }

      #root {
        min-height: 100dvh;
        background-color: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="./images/phenix_common/phenix_logo.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phenix Systems | أنظمة فينيكس</title>
    <script>
      (function () {
        const savedMode = localStorage.getItem("mode") || "dark";
        const savedLang = localStorage.getItem("lang") || "en";
        const root = document.documentElement;

        // تطبيق الكلاس والاتجاه
        if (savedMode === "dark") {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }

        root.setAttribute("dir", savedLang === "ar" ? "rtl" : "ltr");
        root.setAttribute("lang", savedLang);
      })();
    </script>

    <style>
      /* إجبار الخلفية من خلال الـ CSS الداخلي ليكون أسرع من أي ملف خارجي */
      html.dark {
        background-color: #18181b !important; /* لون Zinc-900 */
        color-scheme: dark;
      }

      html:not(.dark) {
        background-color: #f8fafc !important; /* لون Slate-50 */
        color-scheme: light;
      }

      body {
        margin: 0;
        /* نضمن أن الـ body لا يملك خلفية بيضاء افتراضية */
        background-color: transparent !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

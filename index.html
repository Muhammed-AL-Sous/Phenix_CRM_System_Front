<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="./images/phenix_common/phenix_logo.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phenix Systems | أنظمة فينيكس</title>
    <script>
      (function () {
        const savedMode = localStorage.getItem("mode") || "dark";
        const savedLang = localStorage.getItem("lang") || "en";
        const root = document.documentElement;

        // تطبيق الكلاس والاتجاه
        if (savedMode === "dark") {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }

        root.setAttribute("dir", savedLang === "ar" ? "rtl" : "ltr");
        root.setAttribute("lang", savedLang);
      })();
    </script>

    <style>
      /* إجبار الخلفية من خلال الـ CSS الداخلي ليكون أسرع من أي ملف خارجي */
      html.dark {
        background-color: #18181b !important; /* لون Zinc-900 */
        color-scheme: dark;
      }

      html:not(.dark) {
        background-color: #f8fafc !important; /* لون Slate-50 */
        color-scheme: light;
      }

      body {
        margin: 0;
        /* نضمن أن الـ body لا يملك خلفية بيضاء افتراضية */
        background-color: transparent !important;
      }

      /* لودر فوري قبل تحميل JS — يمنع شاشة فارغة تبدو وكأن الموقع معطّل */
      #phenix-initial-loader {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 0;
      }

      html.dark #phenix-initial-loader {
        background-color: #18181b;
      }

      html:not(.dark) #phenix-initial-loader {
        background-color: #f8fafc;
      }

      #phenix-initial-loader .phenix-initial-spinner {
        width: 3rem;
        height: 3rem;
        border-radius: 9999px;
        border: 4px solid transparent;
        border-top-color: #ef4444;
        border-right-color: rgba(239, 68, 68, 0.35);
        animation: phenix-spin 0.75s linear infinite;
      }

      @keyframes phenix-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="phenix-initial-loader" aria-busy="true" aria-live="polite">
        <div class="phenix-initial-spinner" role="status" aria-label="Loading"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
